<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Interaction</title>
</head>
<body>

    <h2>Trainer Details</h2>

    <script>
        let userName = prompt("Enter your name:");
        alert("Welcome " + userName + "!");

        let learnJS = confirm("Do you want to learn JavaScript?");

        if (learnJS) {
            alert("Great Choice!");
        } else {
            alert("No Problem!");
        }
    </script>

</body>
</html>
