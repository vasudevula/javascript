<script>

let fruits = {
    tropical: ["mango", "pineapple"],
    berries: ["strawberry", "blueberry"],
    citrus: ["orange", "lemon"]
};

document.write(fruits.berries[1] + "<br>");   // blueberry
document.write(fruits.tropical[0] + "<br>");  // mango

document.write("Total categories: " + Object.keys(fruits).length);

</script>
