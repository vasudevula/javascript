<!DOCTYPE html>
<html>
<head>
    <title>Task 4</title>
</head>
<body>

<script>
let colors = ["Red", "Blue", "Green", "Yellow", "Pink", "Orange"];

document.write("First color: " + colors[0] + "<br>");
document.write("Last color: " + colors[colors.length - 1] + "<br>");
document.write("Total colors: " + colors.length + "<br><br>");

for (let i = 0; i < colors.length; i++) {
    document.write(i + " : " + colors[i] + "<br>");
}
</script>

</body>
</html>
